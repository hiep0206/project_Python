{% extends "shop/base.html" %}
{% block title %}Đăng ký tài khoản{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-body p-5">
                <h2 class="text-center fw-bold mb-4">Đăng ký</h2>
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-3 rounded-pill">TẠO TÀI KHOẢN</button>
                </form>
                <hr>
                <p class="text-center mb-0">Đã có tài khoản? <a href="{% url 'shop:login' %}" class="text-decoration-none">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
